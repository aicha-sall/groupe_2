name: Deploy Flask App to EC2

on:
  push:
    branches:
      - main
 
jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Récupérer le code du dépôt
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2️⃣ Configuration SSH
      - name: Setup SSH
        env:
          EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
          EC2_HOST: ${{ secrets.EC2_HOST }}
        run: |
          mkdir -p ~/.ssh
          echo "$EC2_SSH_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H $EC2_HOST >> ~/.ssh/known_hosts

      # 3️⃣ Créer le dossier sur le serveur (si n'existe pas)
      - name: Ensure target directory exists on EC2
        env:
          EC2_USER: ${{ secrets.EC2_USER }}
          EC2_HOST: ${{ secrets.EC2_HOST }}
        run: |
          ssh -i ~/.ssh/id_rsa $EC2_USER@$EC2_HOST \
          "mkdir -p /home/ubuntu/${{ github.event.repository.name }} && \
           sudo chown -R ubuntu:ubuntu /home/ubuntu/${{ github.event.repository.name }}"

      # 4️⃣ Copier le projet (sans .git et venv)
      - name: Copy project to EC2
        env:
          EC2_USER: ${{ secrets.EC2_USER }}
          EC2_HOST: ${{ secrets.EC2_HOST }}
        run: |
          rsync -avz --exclude '.git' --exclude 'venv' \
          -e "ssh -i ~/.ssh/id_rsa" ./ \
          $EC2_USER@$EC2_HOST:/home/ubuntu/${{ github.event.repository.name }}

      # 5️⃣ Installer dépendances et lancer l'application
      - name: Install dependencies and run app on EC2
        env:
          EC2_USER: ${{ secrets.EC2_USER }}
          EC2_HOST: ${{ secrets.EC2_HOST }}
        run: |
          ssh -i ~/.ssh/id_rsa $EC2_USER@$EC2_HOST << EOF
            cd /home/ubuntu/${{ github.event.repository.name }}

            python3 -m venv venv
            source venv/bin/activate

            pip install --upgrade pip
            pip install -r requirements.txt

            # Tuer ancien processus Flask si existe
            pkill -f app.py || true

            # Lancer l'application en arrière-plan
            nohup python app.py > app.log 2>&1 &
          EOF
